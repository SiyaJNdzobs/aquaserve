{% extends 'core/base.html' %}
{% block content %}

<div class="form-container">
    <h2>Track Request</h2>

    <p>Logged in as: <strong>{{ username }}</strong></p>

    <p>News: We recently launched improved location-based tracking for requests in your area. Check status updates below.</p>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="ref" placeholder="Enter Reference" required>
        <button class="btn">Track</button>
    </form>

    {% if status %}
    <p style="margin-top: 14px;"><strong>Status:</strong> {{ status }}</p>
    {% endif %}
</div>

{% endblock %}
