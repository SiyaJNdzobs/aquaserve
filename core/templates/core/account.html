{% extends 'core/base.html' %}
{% block content %}

<h2>Your Water Profile</h2>

<div class="account-box">
    <h3>Welcome, {{ username }}</h3>
    <p><strong>Email:</strong> {{ email }}</p>
    <p><strong>Home Address:</strong> {{ home_address }}</p>
    <p><strong>Cell Number:</strong> {{ cell_number }}</p>
    <p><strong>Current Balance:</strong> <span style="font-size: 1.4rem;">R{{ balance }}</span></p>
</div>

<div class="account-actions">
    <a href="/payment/" class="btn">Pay Bill</a>
</div>

{% endblock %}
