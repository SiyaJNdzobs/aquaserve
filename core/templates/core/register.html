{% extends 'core/base.html' %}
{% block content %}

<div class="form-container">
    <h2>Create Account</h2>

    {% if error %}
    <div class="alert" style="color: #de3838; margin-bottom: 10px;">{{ error }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Choose a username" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email address" required>

        <label for="home_address">Home Address</label>
        <input type="text" id="home_address" name="home_address" placeholder="Enter your home address" required>

        <label for="cell_number">Cell Number</label>
        <input type="tel" id="cell_number" name="cell_number" placeholder="Enter your cell number" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Create a password" required>

        <button class="btn">Register</button>
    </form>

    <p>Already have an account? <a href="/login/">Login</a></p>
</div>

{% endblock %}
